<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>洗鞋机项目 - 现实考虑</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Alibaba PuHuiTi 3.0", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif;
      background-color: #ffffff;
      color: #000000;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* 返回按钮 */
    .back-button {
      position: absolute;
      top: 40px;
      left: 40px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #000000;
      font-size: 18px;
      cursor: pointer;
      transition: opacity 0.3s ease;
      text-decoration: none;
      z-index: 10;
    }

    .back-button:hover {
      opacity: 0.8;
    }

    .back-arrow {
      width: 24px;
      height: 24px;
    }

    /* 下一页按钮 */
    .next-button {
      position: absolute;
      top: 40px;
      right: 40px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #000000;
      font-size: 18px;
      cursor: pointer;
      transition: opacity 0.3s ease;
      text-decoration: none;
      z-index: 10;
    }

    .next-button:hover {
      opacity: 0.8;
    }

    .next-arrow {
      width: 24px;
      height: 24px;
    }

    /* 导航栏 */
    .navbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      padding: 16px 40px;
      z-index: 9;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    }

    .nav-container {
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .nav-item {
      color: #000000;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 20px;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .nav-item:hover {
      background: rgba(0, 0, 0, 0.1);
      transform: translateY(-2px);
    }

    .nav-item.active {
      background: rgba(0, 0, 0, 0.2);
      font-weight: 600;
    }

    /* 图片容器 */
    .image-container {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      padding: 0;
      overflow: hidden;
    }

    .main-image {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      max-width: 100%;
      max-height: 100%;
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
      .back-button {
        top: 80px;
        left: 20px;
        font-size: 16px;
      }
      
      .navbar {
        padding: 12px 20px;
      }
      
      .nav-container {
        gap: 12px;
      }
      
      .nav-item {
        font-size: 12px;
        padding: 6px 12px;
      }
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->

    <div class="nav-container">

      <a href="shoemate-page10.html" class="nav-item active">现实考虑</a>
    </div>
  </div>
  
  <!-- 返回按钮 -->
  <a href="contents.html" class="back-button">

    <!-- 鼠标滚轮导航 -->
    <script>
      // 页面导航映射
      const pages = [
        'shoemate.html',
        'shoemate-page1.html',
        'shoemate-page2.html',
        'shoemate-page3.html',
        'shoemate-page4.html',
        'shoemate-page5.html',
        'shoemate-page6.html',
        'shoemate-page7.html',
        'shoemate-page8.html',
        'shoemate-page9.html',
        'shoemate-page10.html'
      ];

      // 当前页面索引
      const currentPage = pages.indexOf('shoemate-page10.html');

      // 鼠标滚轮事件监听
      let isScrolling = false;
      window.addEventListener('wheel', function(e) {
        if (isScrolling) return;
        
        isScrolling = true;
        
        if (e.deltaY > 0) {
          // 向下滚动 - 下一页
          if (currentPage < pages.length - 1) {
            window.location.href = pages[currentPage + 1];
          }
        } else {
          // 向上滚动 - 上一页
          if (currentPage > 0) {
            window.location.href = pages[currentPage - 1];
          }
        }

        // 防止重复触发
        setTimeout(() => {
          isScrolling = false;
        }, 500);
      });
    </script>
  </body>
