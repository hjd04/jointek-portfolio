<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Cover | 作品集封面</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary-color: #0077b5;
      --secondary-color: #00b4d8;
      --accent-color: #90e0ef;
      --text-dark: #1a1a2e;
      --text-light: #4a4a68;
      --bg-light: #f8fafc;
      --card-bg: rgba(255, 255, 255, 0.95);
      --gradient-primary: linear-gradient(135deg, #0077b5 0%, #00b4d8 100%);
      --gradient-accent: linear-gradient(135deg, #90e0ef 0%, #caf0f8 100%);
    }

    body {
      font-family: 'Noto Sans SC', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-light);
      color: var(--text-dark);
      line-height: 1.6;
      min-height: 100vh;
      overflow: hidden;
    }

    /* 高级模糊彩色动效背景 */
    .background-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
      background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #f0fdf4 100%);
    }

    .bg-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.6;
      transition: transform 0.1s ease-out, background 2s ease-out, width 1s ease-out, height 1s ease-out;
    }

    .container {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding: 60px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* 封面标题 */
    .hero-title {
      font-size: 120px;
      font-weight: 700;
      font-family: 'AION Type', 'Noto Sans SC', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 24px;
      text-align: center;
      letter-spacing: 2px;
      animation: fadeInUp 0.8s ease-out;
    }

    /* 副标题 */
    .hero-subtitle {
      font-size: 18px;
      color: var(--text-light);
      font-family: 'Inter', sans-serif;
      letter-spacing: 3px;
      margin-bottom: 60px;
      animation: fadeInUp 0.8s ease-out 0.2s both;
      text-decoration: none;
      cursor: pointer;
      transition: color 0.3s ease;
    }

    .hero-subtitle:hover {
      color: var(--primary-color);
    }

    /* 进入按钮卡片容器 */
    .button-container {
      display: flex;
      gap: 20px;
      animation: fadeInUp 0.8s ease-out 0.4s both;
    }

    /* 进入按钮卡片 */
    .enter-button-card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 24px 48px;
      box-shadow: 0 4px 24px rgba(0, 119, 181, 0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 119, 181, 0.08);
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .enter-button-card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 8px 32px rgba(0, 119, 181, 0.15);
    }

    .enter-button-card .divider-line {
      width: 2px;
      height: 24px;
      background: var(--gradient-primary);
      border-radius: 1px;
      opacity: 0.3;
    }

    .enter-button-card .text-item {
      font-size: 16px;
      color: var(--text-dark);
      font-weight: 500;
    }

    .enter-button-card .text-item:nth-child(1) {
      color: #008e55;
    }

    .enter-button-card .text-item:nth-child(3) {
      color: #008071;
    }

    .enter-button-card .text-item:nth-child(5) {
      color: var(--primary-color);
    }

    /* 工业设计作品集按钮 */
    .portfolio-button {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 24px 48px;
      box-shadow: 0 4px 24px rgba(0, 119, 181, 0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 119, 181, 0.08);
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .portfolio-button:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 8px 32px rgba(0, 119, 181, 0.15);
    }

    .portfolio-button .button-text {
      font-size: 18px;
      color: var(--text-dark);
      font-weight: 600;
      white-space: nowrap;
    }

    /* 汽车渲染作品集按钮 */
    .render-button {
      background: linear-gradient(135deg, #0077b5 0%, #00b4d8 100%);
      border-radius: 24px;
      padding: 24px 48px;
      box-shadow: 0 4px 24px rgba(0, 119, 181, 0.15);
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .render-button:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 8px 32px rgba(0, 119, 181, 0.25);
    }

    .render-button .button-text {
      font-size: 18px;
      color: #ffffff;
      font-weight: 600;
      white-space: nowrap;
    }

    /* 动画 */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 响应式设计 */
    @media (max-width: 900px) {
      .hero-title {
        font-size: 56px;
      }

      .button-container {
        flex-direction: column;
        align-items: center;
      }

      .enter-button-card {
        flex-wrap: wrap;
        justify-content: center;
        padding: 20px 30px;
      }

      .enter-button-card .divider-line {
        display: none;
      }
    }

    @media (max-width: 600px) {
      .container {
        padding: 40px 30px;
      }

      .hero-title {
        font-size: 42px;
      }

      .hero-subtitle {
        font-size: 14px;
        letter-spacing: 2px;
      }

      .button-container {
        flex-direction: column;
        align-items: center;
        width: 100%;
      }

      .portfolio-button,
      .render-button {
        width: 100%;
        max-width: 280px;
        justify-content: center;
      }

      .enter-button-card {
        padding: 18px 24px;
        gap: 15px;
      }

      .enter-button-card .text-item {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="background-animation"></div>
  
  <div class="container">
    <h1 class="hero-title">Portfolio</h1>
    <a href="resume.html" class="hero-subtitle">华东师范大学 - 黄俊德</a>
    
    <div class="button-container">
      <div class="portfolio-button" onclick="window.location.href='contents.html'">
        <span class="button-text">工业设计作品集</span>
      </div>
      <div class="render-button" onclick="window.location.href='car-render.html'">
        <span class="button-text">汽车渲染作品集</span>
      </div>
    </div>
  </div>
  
  <script>
    // 预设的蓝绿色系色彩范围
    const colors = [
      'linear-gradient(135deg, #65b9ff, #007fb5)',
      'linear-gradient(135deg, #30ff9e, #008e55)',
      'linear-gradient(135deg, #4ecdc4, #45b7d1)',
      'linear-gradient(135deg, #00c9ff, #92fe9d)',
      'linear-gradient(135deg, #a8edea, #fed6e3)',
      'linear-gradient(135deg, #84fab0, #8fd3f4)'
    ];

    // 创建多个背景模糊圆点
    const blobCount = 5;
    const backgroundAnimation = document.querySelector('.background-animation');
    
    // 清空现有的圆点
    backgroundAnimation.innerHTML = '';
    
    // 创建新的圆点
    for (let i = 0; i < blobCount; i++) {
      const blob = document.createElement('div');
      blob.classList.add('bg-blob');
      
      // 随机初始位置
      const initialX = Math.random() * 100;
      const initialY = Math.random() * 100;
      
      // 随机初始大小
      const size = 300 + Math.random() * 300;
      
      // 随机初始颜色
      const color = colors[Math.floor(Math.random() * colors.length)];
      
      blob.style.width = `${size}px`;
      blob.style.height = `${size}px`;
      blob.style.left = `${initialX}%`;
      blob.style.top = `${initialY}%`;
      blob.style.background = color;
      
      // 存储初始位置和速度
      blob.dataset.x = initialX;
      blob.dataset.y = initialY;
      blob.dataset.speedX = (Math.random() - 0.5) * 0.1;
      blob.dataset.speedY = (Math.random() - 0.5) * 0.1;
      
      backgroundAnimation.appendChild(blob);
    }

    // 鼠标位置跟踪
    let mouseX = 0.5;
    let mouseY = 0.5;
    
    document.addEventListener('mousemove', function(e) {
      mouseX = e.clientX / window.innerWidth;
      mouseY = e.clientY / window.innerHeight;
    });

    // 动画循环
    function animate() {
      const blobs = document.querySelectorAll('.bg-blob');
      
      blobs.forEach((blob, index) => {
        // 获取当前位置
        let x = parseFloat(blob.dataset.x);
        let y = parseFloat(blob.dataset.y);
        
        // 获取速度
        let speedX = parseFloat(blob.dataset.speedX);
        let speedY = parseFloat(blob.dataset.speedY);
        
        // 鼠标位置影响
        const mouseInfluence = 0.02 * (index + 1);
        const targetX = x + (mouseX * 100 - x) * mouseInfluence;
        const targetY = y + (mouseY * 100 - y) * mouseInfluence;
        
        // 平滑过渡到目标位置
        x += (targetX - x) * 0.05;
        y += (targetY - y) * 0.05;
        
        // 边界检查和反弹
        if (x < 0 || x > 100) {
          speedX *= -1;
        }
        if (y < 0 || y > 100) {
          speedY *= -1;
        }
        
        // 随机移动
        x += speedX;
        y += speedY;
        
        // 随机大小变化
        const size = 300 + Math.sin(Date.now() * 0.001 + index) * 100;
        
        // 随机颜色变化（偶尔）
        if (Math.random() < 0.001) {
          const color = colors[Math.floor(Math.random() * colors.length)];
          blob.style.background = color;
        }
        
        // 更新位置和速度
        blob.dataset.x = x;
        blob.dataset.y = y;
        blob.dataset.speedX = speedX;
        blob.dataset.speedY = speedY;
        
        // 应用变换
        blob.style.transform = `translate(${x - 50}%, ${y - 50}%)`;
        blob.style.width = `${size}px`;
        blob.style.height = `${size}px`;
      });
      
      requestAnimationFrame(animate);
    }

    // 启动动画
    animate();
  </script>
</body>
</html>
