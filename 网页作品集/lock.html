<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>密码验证 - 作品集</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Alibaba PuHuiTi 3.0", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .lock-container {
      text-align: center;
      padding: 40px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .lock-icon {
      width: 60px;
      height: 60px;
      margin-bottom: 30px;
    }

    h1 {
      color: #ffffff;
      font-size: 24px;
      margin-bottom: 30px;
      font-weight: 500;
    }

    .password-input {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .password-input input {
      width: 50px;
      height: 60px;
      text-align: center;
      font-size: 28px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
      outline: none;
      transition: all 0.3s ease;
    }

    .password-input input:focus {
      border-color: #4a90e2;
      background: rgba(255, 255, 255, 0.15);
    }

    .password-input input.error {
      border-color: #e74c3c;
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    .error-message {
      color: #e74c3c;
      font-size: 14px;
      height: 20px;
      margin-bottom: 20px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .error-message.show {
      opacity: 1;
    }

    .submit-btn {
      padding: 12px 40px;
      font-size: 16px;
      background: #4a90e2;
      color: #ffffff;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .submit-btn:hover {
      background: #357abd;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="lock-container">
    <svg class="lock-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="11" width="18" height="11" rx="2" stroke="#ffffff" stroke-width="2"/>
      <path d="M7 11V7a5 5 0 0110 0v4" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <h1>请输入访问密码</h1>
    <div class="password-input">
      <input type="password" maxlength="1" class="pwd-input">
      <input type="password" maxlength="1" class="pwd-input">
      <input type="password" maxlength="1" class="pwd-input">
      <input type="password" maxlength="1" class="pwd-input">
      <input type="password" maxlength="1" class="pwd-input">
      <input type="password" maxlength="1" class="pwd-input">
    </div>
    <div class="error-message">密码错误，请重新输入</div>
    <button class="submit-btn" onclick="checkPassword()">确认</button>
  </div>

  <script>
    const inputs = document.querySelectorAll('.pwd-input');
    const errorMessage = document.querySelector('.error-message');
    const CORRECT_PASSWORD = '204702';

    inputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        if (e.target.value.length === 1) {
          if (index < inputs.length - 1) {
            inputs[index + 1].focus();
          }
        }
        errorMessage.classList.remove('show');
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && e.target.value.length === 0) {
          if (index > 0) {
            inputs[index - 1].focus();
          }
        }
      });

      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const pasteData = e.clipboardData.getData('text');
        if (pasteData.length === 6 && /^\d+$/.test(pasteData)) {
          inputs.forEach((input, i) => {
            input.value = pasteData[i];
          });
          inputs[5].focus();
        }
      });
    });

    function checkPassword() {
      let password = '';
      inputs.forEach(input => {
        password += input.value;
      });

      if (password === CORRECT_PASSWORD) {
        window.location.href = 'index.html';
      } else {
        errorMessage.classList.add('show');
        inputs.forEach(input => {
          input.classList.add('error');
          input.value = '';
        });
        inputs[0].focus();
        setTimeout(() => {
          inputs.forEach(input => input.classList.remove('error'));
        }, 500);
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        checkPassword();
      }
    });

    if (localStorage.getItem('portfolio_access') === 'true') {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
