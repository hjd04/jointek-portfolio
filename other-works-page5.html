<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>其他作品 - 汽车渲染</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Alibaba PuHuiTi 3.0", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif;
      background-color: #ffffff;
      color: #000000;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .back-button {
      position: absolute;
      top: 40px;
      left: 40px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #000000;
      font-size: 18px;
      cursor: pointer;
      transition: opacity 0.3s ease;
      text-decoration: none;
      z-index: 10;
    }

    .back-button:hover {
      opacity: 0.8;
    }

    .back-arrow {
      width: 24px;
      height: 24px;
    }

    .image-container {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      padding: 0;
      overflow: hidden;
    }

    .main-image {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      max-width: 100%;
      max-height: 100%;
    }

    .navbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      background: #ffffff;
      backdrop-filter: blur(10px);
      padding: 16px 40px;
      z-index: 9;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    }

    .nav-container {
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .nav-item {
      color: #000000;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 20px;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .nav-item:hover {
      background: rgba(0, 0, 0, 0.1);
      transform: translateY(-2px);
    }

    .nav-item.active {
      background: rgba(0, 0, 0, 0.1);
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .back-button {
        top: 80px;
        left: 20px;
        font-size: 16px;
      }
      
      .navbar {
        padding: 12px 20px;
      }
      
      .nav-container {
        gap: 12px;
      }
      
      .nav-item {
        font-size: 12px;
        padding: 6px 12px;
      }
    }
    
    .car-render-button {
      position: fixed;
      bottom: 200px;
      left: 50%;
      transform: translateX(-50%);
      padding: 16px 32px;
      background-color: #0077b5;
      color: #ffffff;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.3s ease;
      z-index: 100;
    }

    .car-render-button:hover {
      background-color: #005a8c;
      transform: translateX(-50%) scale(1.05);
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="nav-container">
      <a href="other-works.html" class="nav-item">封面</a>
      <a href="other-works-page1.html" class="nav-item">犀牛建模</a>
      <a href="other-works-page2.html" class="nav-item">产品设计1</a>
      <a href="other-works-page3.html" class="nav-item">产品设计2</a>
      <a href="other-works-page4.html" class="nav-item">动画制作</a>
      <a href="other-works-page5.html" class="nav-item active">汽车渲染</a>
      <a href="other-works-page6.html" class="nav-item">手绘与商单</a>
    </div>
  </div>
  
  <a href="contents.html" class="back-button">
    <svg class="back-arrow" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M19 12H5M5 12L12 5M5 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    返回作品目录
  </a>
  
  <div class="image-container">
    <img src="https://jointek-1428336988.cos.ap-guangzhou.myqcloud.com/img/其他作品 5.webp" alt="其他作品5" class="main-image">
  </div>
    <script>
      const pages = [
        'other-works.html',
        'other-works-page1.html',
        'other-works-page2.html',
        'other-works-page3.html',
        'other-works-page4.html',
        'other-works-page5.html',
        'other-works-page6.html'
      ];

      const currentPage = pages.indexOf('other-works-page5.html');

      let isScrolling = false;
      window.addEventListener('wheel', function(e) {
        if (isScrolling) return;
        
        isScrolling = true;
        
        if (e.deltaY > 0) {
          if (currentPage < pages.length - 1) {
            window.location.href = pages[currentPage + 1];
          }
        } else {
          if (currentPage > 0) {
            window.location.href = pages[currentPage - 1];
          }
        }

        setTimeout(() => {
          isScrolling = false;
        }, 500);
      });
    </script>
    
    <button class="car-render-button" onclick="window.location.href='car-render.html'">点击跳转至汽车渲染作品集</button>
  </body>
</html>
