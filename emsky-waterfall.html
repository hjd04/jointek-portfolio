<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMSKY飞行汽车项目 - 瀑布式浏览</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Alibaba PuHuiTi 3.0", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif;
      background-color: #ffffff;
      color: #000000;
      line-height: 1.6;
      min-height: 100vh;
      position: relative;
    }

    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #000000;
      font-size: 18px;
      cursor: pointer;
      transition: opacity 0.3s ease;
      text-decoration: none;
      z-index: 10;
    }

    .back-button:hover {
      opacity: 0.7;
    }

    .back-arrow {
      width: 24px;
      height: 24px;
    }

    .back-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: 20px 40px;
      z-index: 10;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: rgba(255, 255, 255, 0.5);
    }

    @media (max-width: 768px) {
      .back-container {
        padding: 15px 20px;
      }
    }

    .waterfall-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 20px 40px;
      gap: 20px;
    }

    .waterfall-image {
      width: 100%;
      max-width: 800px;
      height: auto;
      object-fit: contain;
    }

    @media (max-width: 768px) {
      .waterfall-container {
        padding: 70px 16px 30px;
        gap: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="back-container">
    <a href="contents.html" class="back-button">
      <svg class="back-arrow" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M19 12H5M5 12L12 5M5 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      返回作品目录
    </a>
  </div>
  
  <div class="waterfall-container">
    <img src="https://jointek-1428336988.cos.ap-guangzhou.myqcloud.com/img/Emsky 1.webp" alt="Emsky1" class="waterfall-image">
    <img src="https://jointek-1428336988.cos.ap-guangzhou.myqcloud.com/img/Emsky 2.webp" alt="Emsky2" class="waterfall-image">
    <img src="https://jointek-1428336988.cos.ap-guangzhou.myqcloud.com/img/Emsky 3.webp" alt="Emsky3" class="waterfall-image">
    <img src="https://jointek-1428336988.cos.ap-guangzhou.myqcloud.com/img/Emsky 4.webp" alt="Emsky4" class="waterfall-image">
    <img src="https://jointek-1428336988.cos.ap-guangzhou.myqcloud.com/img/Emsky 5.webp" alt="Emsky5" class="waterfall-image">
    <img src="https://jointek-1428336988.cos.ap-guangzhou.myqcloud.com/img/Emsky 6.webp" alt="Emsky6" class="waterfall-image">
    <img src="https://jointek-1428336988.cos.ap-guangzhou.myqcloud.com/img/Emsky 7.webp" alt="Emsky7" class="waterfall-image">
    <img src="https://jointek-1428336988.cos.ap-guangzhou.myqcloud.com/img/Emsky 8.webp" alt="Emsky8" class="waterfall-image">
    <img src="https://jointek-1428336988.cos.ap-guangzhou.myqcloud.com/img/Emsky 9.webp" alt="Emsky9" class="waterfall-image">
    <img src="https://jointek-1428336988.cos.ap-guangzhou.myqcloud.com/img/Emsky 10.webp" alt="Emsky10" class="waterfall-image">
  </div>
</body>
</html>
