<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMSKY - 功能部件</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-dark: #000000;
            --text-light: #ffffff;
            --primary-color: #006ab4;
            --secondary-color: #51e6d5;
            --accent-color: #008aea;
            --background-color: #ffffff;
            --gradient-start: rgba(255, 255, 255, 0.6);
            --gradient-end: rgba(230, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Alibaba PuHuiTi 3.0", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif;
            background-color: #f0f4f8;
            color: #000000;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 主容器 */
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        /* 返回按钮 */
        .back-button {
            position: absolute;
            top: 40px;
            left: 40px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #000000;
            font-size: 18px;
            cursor: pointer;
            transition: opacity 0.3s ease;
            text-decoration: none;
            z-index: 10;
        }

        .back-button:hover {
            opacity: 0.6;
        }

        .back-arrow {
            width: 24px;
            height: 24px;
        }

        /* 导航栏 */
        .navbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 16px 40px;
            z-index: 9;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .nav-container {
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .nav-item {
            color: #000000;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .nav-item:hover {
            background: rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .nav-item.active {
            background: rgba(0, 0, 0, 0.2);
            font-weight: 600;
        }

        /* 图片容器 */
        .image-container {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .main-image {
            width: 100vw;
            height: 100vh;
            object-fit: contain;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .back-button {
                top: 20px;
                left: 20px;
                padding: 12px 18px;
                font-size: 14px;
            }

            .navbar {
                top: 80px;
                padding: 10px 20px;
                gap: 12px;
            }

            .nav-item {
                font-size: 12px;
                padding: 6px 12px;
            }
        }

        @media (max-width: 480px) {
            .navbar {
                gap: 8px;
            }

            .nav-item {
                font-size: 10px;
                padding: 4px 8px;
            }
        }
    </style>
</head>
<body>
    <!-- 返回按钮 -->
    <a href="contents.html" class="back-button">
        <svg class="back-arrow" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M19 12H5M5 12L12 5M5 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>返回作品目录</span>
    </a>

    <!-- 导航栏 -->
    <div class="navbar">
        <div class="nav-container">
            <a href="emsky.html" class="nav-item">封面</a>
            <a href="emsky-page1.html" class="nav-item">项目背景</a>
            <a href="emsky-page2.html" class="nav-item">用户调研</a>
            <a href="emsky-page3.html" class="nav-item">技术调研</a>
            <a href="emsky-page4.html" class="nav-item">设计定位</a>
            <a href="emsky-page5.html" class="nav-item">造型推演</a>
            <a href="emsky-page6.html" class="nav-item active">效果图</a>
            <a href="emsky-page7.html" class="nav-item">外饰设计细节</a>
            <a href="emsky-page8.html" class="nav-item">内饰设计细节</a>
            <a href="emsky-page9.html" class="nav-item">服务设计</a>
            <a href="emsky-page10.html" class="nav-item">服务流程</a>
        </div>
    </div>

    <!-- 图片容器 -->
    <div class="image-container">
        <img src="https://cdn.jsdelivr.net/gh/hjd04/jointek.github.io@main/img/Emsky 6.webp" alt="功能部件" class="main-image">
    </div>

    <!-- 鼠标滚轮导航 -->
    <script>
      // 页面导航映射
      const pages = [
        'emsky.html',
        'emsky-page1.html',
        'emsky-page2.html',
        'emsky-page3.html',
        'emsky-page4.html',
        'emsky-page5.html',
        'emsky-page6.html',
        'emsky-page7.html',
        'emsky-page8.html',
        'emsky-page9.html',
        'emsky-page10.html'
      ];

      // 当前页面索引
      const currentPage = pages.indexOf('emsky-page6.html');

      // 鼠标滚轮事件监听
      let isScrolling = false;
      window.addEventListener('wheel', function(e) {
        if (isScrolling) return;
        
        isScrolling = true;
        
        if (e.deltaY > 0) {
          // 向下滚动 - 下一页
          if (currentPage < pages.length - 1) {
            window.location.href = pages[currentPage + 1];
          }
        } else {
          // 向上滚动 - 上一页
          if (currentPage > 0) {
            window.location.href = pages[currentPage - 1];
          }
        }

        // 防止重复触发
        setTimeout(() => {
          isScrolling = false;
        }, 500);
      });
    </script>
</body>
</html>
