<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>机械臂项目 - 效果图</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Alibaba PuHuiTi 3.0", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif;
      background-color: #ffffff;
      color: #000000;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .back-button {
      position: absolute;
      top: 40px;
      left: 40px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #000000;
      font-size: 18px;
      cursor: pointer;
      transition: opacity 0.3s ease;
      text-decoration: none;
      z-index: 10;
    }

    .back-button:hover {
      opacity: 0.8;
    }

    .back-arrow {
      width: 24px;
      height: 24px;
    }

    .image-container {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      padding: 0;
      overflow: hidden;
    }

    .main-image {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      max-width: 100%;
      max-height: 100%;
    }

    .navbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      padding: 16px 40px;
      z-index: 9;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    }

    .nav-container {
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .nav-item {
      color: #000000;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 20px;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .nav-item:hover {
      background: rgba(0, 0, 0, 0.1);
      transform: translateY(-2px);
    }

    .nav-item.active {
      background: rgba(0, 0, 0, 0.2);
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .back-button {
        top: 80px;
        left: 20px;
        font-size: 16px;
      }
      
      .navbar {
        padding: 12px 20px;
      }
      
      .nav-container {
        gap: 12px;
      }
      
      .nav-item {
        font-size: 12px;
        padding: 6px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="nav-container">
      <a href="mrxa.html" class="nav-item">封面</a>
      <a href="mrxa-page1.html" class="nav-item">项目背景</a>
      <a href="mrxa-page2.html" class="nav-item">康复对象与流程</a>
      <a href="mrxa-page3.html" class="nav-item">竞品分析</a>
      <a href="mrxa-page4.html" class="nav-item">设计探索与迭代</a>
      <a href="mrxa-page5.html" class="nav-item active">效果图</a>
      <a href="mrxa-page6.html" class="nav-item">结构与技术设计</a>
    </div>
  </div>
  
  <a href="contents.html" class="back-button">
    <svg class="back-arrow" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M19 12H5M5 12L12 5M5 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    返回作品目录
  </a>
  
  <div class="image-container">
    <img src=".figma/image/机械臂 5.jpg" alt="机械臂5" class="main-image">
  </div>
    <script>
      const pages = [
        'mrxa.html',
        'mrxa-page1.html',
        'mrxa-page2.html',
        'mrxa-page3.html',
        'mrxa-page4.html',
        'mrxa-page5.html',
        'mrxa-page6.html'
      ];

      const currentPage = pages.indexOf('mrxa-page5.html');

      let isScrolling = false;
      window.addEventListener('wheel', function(e) {
        if (isScrolling) return;
        
        isScrolling = true;
        
        if (e.deltaY > 0) {
          if (currentPage < pages.length - 1) {
            window.location.href = pages[currentPage + 1];
          }
        } else {
          if (currentPage > 0) {
            window.location.href = pages[currentPage - 1];
          }
        }

        setTimeout(() => {
          isScrolling = false;
        }, 500);
      });
    </script>
  </body>
</html>
