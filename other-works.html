<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>其他作品 - Jointek</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Alibaba PuHuiTi 3.0", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif;
      background-color: #f0f4f8;
      color: #ffffff;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .background-image {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background-image: url('https://cdn.jsdelivr.net/gh/hjd04/jointek.github.io@main/img/moc58btd-gop8qk5.webp');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .gradient-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background-image: linear-gradient(90deg, #204b7299 9.9%, #5c7f9e00 98.1%);
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      padding: 150px 0;
    }

    .content-area {
      width: 100%;
      padding: 0 15%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .logo-area {
      display: flex;
      align-items: flex-end;
      gap: 20px;
      width: 100%;
      margin-bottom: 0;
    }

    .logo-image {
      width: 200px;
      height: auto;
    }

    .project-title {
      font-size: 36px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 24px;
      letter-spacing: -1px;
      line-height: 1.3;
      margin-left: 10px;
    }

    .jointek-title {
      font-family: "AION Type", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif;
      font-size: 72px;
      font-weight: 400;
      background: linear-gradient(180deg, #83fff1 26.44%, #0089e9 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 32px;
      margin-left: 10px;
      letter-spacing: 0;
    }

    .tags-area {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
      padding-left: 10px;
      flex-wrap: wrap;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      background-color: #ffffff;
      color: #005aab;
      padding: 8px 20px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: -0.5px;
      line-height: 1.4;
    }

    .link-area {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 32px;
      width: 100%;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #ffffff;
      font-size: 14px;
      text-decoration: none;
      padding: 10px 16px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 8px;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.05);
    }

    .link-item:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.6);
      transform: translateY(-2px);
    }

    .link-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .link-item span {
      letter-spacing: -0.3px;
      line-height: 1.5;
    }

    .back-button {
      position: absolute;
      top: 40px;
      left: 40px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #ffffff;
      font-size: 18px;
      cursor: pointer;
      transition: opacity 0.3s ease;
      text-decoration: none;
      z-index: 10;
    }

    .back-button:hover {
      opacity: 0.8;
    }

    .back-arrow {
      width: 24px;
      height: 24px;
    }

    .navbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 16px 40px;
      z-index: 9;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .nav-container {
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .nav-item {
      color: #ffffff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 20px;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    .nav-item.active {
      background: rgba(255, 255, 255, 0.3);
      font-weight: 600;
    }

    @media (max-width: 1600px) {
      .content-area {
        padding: 0 10%;
      }
      
      .project-title {
        font-size: 32px;
      }
      
      .jointek-title {
        font-size: 64px;
      }

      .tag {
        font-size: 13px;
      }
    }

    @media (max-width: 1200px) {
      .content-area {
        padding: 0 8%;
      }
      
      .logo-area {
        padding-right: 10%;
      }
      
      .project-title {
        font-size: 28px;
      }
      
      .jointek-title {
        font-size: 56px;
      }

      .tag {
        font-size: 13px;
      }

      .tags-area {
        padding-right: 30%;
      }
    }

    @media (max-width: 900px) {
      .container {
        padding: 80px 0;
      }
      
      .content-area {
        padding: 0 24px;
      }
      
      .logo-area {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
        padding-right: 0;
      }
      
      .project-title {
        font-size: 24px;
      }

      .jointek-title {
        font-size: 48px;
      }

      .tags-area {
        flex-wrap: wrap;
        gap: 16px;
        padding-right: 0;
      }
      
      .tag {
        font-size: 13px;
      }
    }

    @media (max-width: 600px) {
      .project-title {
        font-size: 20px;
      }

      .jointek-title {
        font-size: 36px;
      }

      .tag {
        font-size: 12px;
        padding: 6px 14px;
      }

      .link-area {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }

      .link-item {
        font-size: 13px;
        padding: 8px 12px;
      }
    }

    /* 竖屏模式 - 隐藏顶部导航 */
    @media (orientation: portrait) {
      .navbar {
        display: none !important;
      }

      .container {
        padding: 80px 0 100px;
      }
    }

    /* 竖屏模式模糊覆盖层 */
    .portrait-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      background: rgba(255, 255, 255, 0.1);
    }

    @media (orientation: portrait) {
      .portrait-overlay {
        display: block;
      }
    }

    /* 底部查看项目按钮 */
    .view-project-button {
      display: none;
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: transparent;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      color: #ffffff;
      padding: 14px 32px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .view-project-button:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateX(-50%) translateY(-2px);
      box-shadow: 0 6px 25px rgba(0, 0, 0, 0.25);
    }

    @media (orientation: portrait) {
      .view-project-button {
        display: block;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease, transform 0.3s ease;
      }

      .view-project-button.visible {
        opacity: 1;
        pointer-events: auto;
      }
    }
  </style>
</head>
<body>
  <div class="background-image"></div>
  
  <!-- 竖屏模式模糊覆盖层 -->
  <div class="portrait-overlay"></div>
  
  <div class="gradient-overlay"></div>
  
  <div class="container">
    <div class="navbar">
      <div class="nav-container">
        <a href="other-works.html" class="nav-item active">封面</a>
        <a href="other-works-page1.html" class="nav-item">犀牛建模</a>
        <a href="other-works-page2.html" class="nav-item">产品设计1</a>
        <a href="other-works-page3.html" class="nav-item">产品设计2</a>
        <a href="other-works-page4.html" class="nav-item">动画制作</a>
        <a href="other-works-page5.html" class="nav-item">汽车渲染</a>
        <a href="other-works-page6.html" class="nav-item">手绘与商单</a>
      </div>
    </div>
    
    <a href="contents.html" class="back-button">
      <svg class="back-arrow" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M19 12H5M5 12L12 5M5 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      返回作品目录
    </a>
    
    <div class="content-area">
      <div class="logo-area">
      </div>
      
      <h1 class="project-title">其他作品</h1>
      
      <p class="jointek-title">Jointek</p>
      
      <div class="tags-area">
        <div class="tag">建模渲染</div>
        <div class="tag">三维动画</div>
        <div class="tag">产品设计</div>
      </div>
      
      <div class="link-area">
        <a href="https://www.bilibili.com/video/BV1eLPozVEXK/" target="_blank" rel="noopener noreferrer" class="link-item">
          <svg class="link-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>三维动画作品集</span>
        </a>
        <a href="https://space.bilibili.com/358973198" target="_blank" rel="noopener noreferrer" class="link-item">
          <svg class="link-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>B站主页</span>
        </a>
      </div>
    </div>
  </div>
  
  <!-- 底部查看项目按钮 -->
  <button class="view-project-button" onclick="window.location.href='other-works-waterfall.html'">
    查看该项目
  </button>
  
  <script>
    setTimeout(() => {
      const elements = document.querySelectorAll('.logo-area, .project-title, .jointek-title, .tags-area, .link-area');
      
      elements.forEach((el, index) => {
        el.style.opacity = '0';
        el.style.transform = 'translateY(20px)';
        el.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
        
        setTimeout(() => {
          el.style.opacity = '1';
          el.style.transform = 'translateY(0)';
        }, index * 100 + 100);
      });
    }, 100);
  </script>
  <script>
    const pages = [
      'other-works.html',
      'other-works-page1.html',
      'other-works-page2.html',
      'other-works-page3.html',
      'other-works-page4.html',
      'other-works-page5.html',
      'other-works-page6.html'
    ];

    const currentPage = pages.indexOf('other-works.html');

    let isScrolling = false;
    window.addEventListener('wheel', function(e) {
      if (window.matchMedia('(orientation: portrait)').matches) {
        return;
      }
      
      if (isScrolling) return;
      
      isScrolling = true;
      
      if (e.deltaY > 0) {
        if (currentPage < pages.length - 1) {
          window.location.href = pages[currentPage + 1];
        }
      } else {
        if (currentPage > 0) {
          window.location.href = pages[currentPage - 1];
        }
      }

      setTimeout(() => {
        isScrolling = false;
      }, 500);
    });
  </script>
  
  <!-- 竖屏模式滚动到底部显示按钮 -->
  <script>
    const viewButton = document.querySelector('.view-project-button');
    
    function checkScroll() {
      const isPortrait = window.matchMedia('(orientation: portrait)').matches;
      
      if (isPortrait) {
        const scrollTop = window.scrollY || document.documentElement.scrollTop;
        const scrollHeight = document.documentElement.scrollHeight;
        const clientHeight = document.documentElement.clientHeight;
        
        if (scrollTop + clientHeight >= scrollHeight - 50) {
          viewButton.classList.add('visible');
        } else {
          viewButton.classList.remove('visible');
        }
      } else {
        viewButton.classList.remove('visible');
      }
    }
    
    window.addEventListener('scroll', checkScroll);
    window.addEventListener('resize', checkScroll);
    checkScroll();
  </script>
</body>
</html>
