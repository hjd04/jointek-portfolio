<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作品目录 | Contents</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary-color: #0077b5;
      --secondary-color: #00b4d8;
      --accent-color: #90e0ef;
      --text-dark: #1a1a2e;
      --text-light: #4a4a68;
      --bg-light: #f8fafc;
      --card-bg: rgba(255, 255, 255, 0.95);
      --gradient-primary: linear-gradient(135deg, #0077b5 0%, #00b4d8 100%);
      --gradient-accent: linear-gradient(135deg, #90e0ef 0%, #caf0f8 100%);
    }

    body {
      font-family: 'Noto Sans SC', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-light);
      color: var(--text-dark);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 高级模糊彩色动效背景 */
    .background-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
      background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 50%, #f0fdf4 100%);
    }

    .bg-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.6;
      transition: transform 0.1s ease-out, background 2s ease-out, width 1s ease-out, height 1s ease-out;
    }

    /* 返回按钮 */
    .back-button {
      position: absolute;
      top: 40px;
      left: 40px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text-dark);
      font-size: 18px;
      cursor: pointer;
      transition: opacity 0.3s ease;
      text-decoration: none;
      z-index: 10;
    }

    .back-button:hover {
      opacity: 0.7;
    }

    .back-arrow {
      width: 24px;
      height: 24px;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 80px 40px;
      position: relative;
      z-index: 1;
    }

    /* 头部区域 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 80px;
      padding: 0 20px;
    }

    .header-title {
      font-size: 42px;
      font-weight: 600;
      color: var(--text-dark);
      letter-spacing: 1px;
    }

    .header-subtitle {
      font-size: 32px;
      color: var(--text-light);
      font-weight: 300;
      font-family: 'Inter', sans-serif;
      letter-spacing: 2px;
    }

    /* 作品网格 */
    .works-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 20px;
      margin-bottom: 60px;
      padding: 0 15px;
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
      width: 100%;
    }

    /* 作品卡片 */
    .work-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: transform 0.3s ease;
      min-width: 0;
    }

    /* 响应式网格列数 */
    @media (max-width: 1400px) {
      .works-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 900px) {
      .works-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 500px) {
      .works-grid {
        grid-template-columns: 1fr;
      }
    }

    .work-card:hover {
      transform: translateY(-8px);
    }

    /* 作品图片 */
    .work-image {
      width: 100%;
      height: 450px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 24px;
      box-shadow: 0 4px 24px rgba(0, 119, 181, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      max-width: 100%;
      min-width: 100%;
    }

    /* 响应式图片高度 */
    @media (max-width: 1200px) {
      .work-image {
        height: 400px;
      }
    }

    @media (max-width: 768px) {
      .work-image {
        height: 350px;
      }
    }

    @media (max-width: 480px) {
      .work-image {
        height: 300px;
      }
    }

    .work-card:hover .work-image {
      transform: scale(1.02);
      box-shadow: 0 8px 32px rgba(0, 119, 181, 0.15);
    }

    /* 作品标题 */
    .work-title {
      font-size: 18px;
      font-weight: 500;
      color: var(--text-dark);
      margin-bottom: 16px;
      line-height: 1.4;
    }

    /* 奖项标志容器 */
    .work-awards {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    .award-logo {
      height: 24px;
      object-fit: contain;
      opacity: 0.9;
      transition: opacity 0.2s ease;
    }

    .award-logo:hover {
      opacity: 1;
    }

    /* 响应式设计 */
    @media (max-width: 1400px) {
      .container {
        padding: 60px 30px;
      }

      .header {
        margin-bottom: 60px;
      }

      .header-title {
        font-size: 36px;
      }

      .header-subtitle {
        font-size: 28px;
      }

      .work-image {
        height: 300px;
      }
    }

    @media (max-width: 1024px) {
      .work-image {
        height: 280px;
      }
      
      .work-title {
        font-size: 16px;
      }
    }

    @media (max-width: 900px) {
      .container {
        padding: 40px 20px;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .work-image {
        height: 250px;
      }

      .work-title {
        font-size: 14px;
      }
    }

    @media (max-width: 600px) {
      .container {
        padding: 30px 16px;
      }

      .header-title {
        font-size: 28px;
      }

      .header-subtitle {
        font-size: 20px;
      }

      .work-image {
        height: 200px;
      }

      .work-title {
        font-size: 14px;
      }

      .award-logo {
        height: 20px;
      }
    }

    /* 竖屏模式响应式布局 */
    @media (orientation: portrait) {
      .header {
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 0;
        margin-bottom: 40px;
      }

      .header-title {
        font-size: 32px;
      }

      .header-subtitle {
        font-size: 24px;
      }

      .back-button {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 100;
      }

      .container {
        padding-top: 80px;
      }
    }

    /* 极窄屏幕竖屏模式 */
    @media (orientation: portrait) and (max-width: 400px) {
      .header-title {
        font-size: 26px;
      }

      .header-subtitle {
        font-size: 18px;
      }

      .work-image {
        height: 180px;
      }

      .work-title {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="background-animation"></div>
  
  <a href="index.html" class="back-button">
    <svg class="back-arrow" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M19 12H5M5 12L12 5M5 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    返回封面
  </a>
  
  <div class="container">
    <header class="header">
      <h1 class="header-title">作品目录</h1>
      <h2 class="header-subtitle">Contents</h2>
    </header>
    
    <div class="works-grid">
      <div class="work-card" style="cursor: pointer;" onclick="window.location.href='shoemate.html'">
        <img src="https://cdn.jsdelivr.net/gh/hjd04/jointek.github.io@main/img/moapxbwk-rg54cac.webp" alt="海尔智能共享洗鞋机" class="work-image">
        <h3 class="work-title">海尔智能共享洗鞋机</h3>
        <div class="work-awards">
          <img src="https://cdn.jsdelivr.net/gh/hjd04/jointek.github.io@main/img/moapxbwk-6w36gt0.webp" alt="奖项" class="award-logo">
        </div>
      </div>
      
      <div class="work-card" style="cursor: pointer;" onclick="window.location.href='emsky.html'">
        <img src="https://cdn.jsdelivr.net/gh/hjd04/jointek.github.io@main/img/moapxbwk-109s56w.webp" alt="Emsky三段式飞行汽车" class="work-image">
        <h3 class="work-title">Emsky三段式飞行汽车</h3>
        <div class="work-awards">
          <img src="https://cdn.jsdelivr.net/gh/hjd04/jointek.github.io@main/img/moapxbwk-0niislo.webp" alt="奖项" class="award-logo">
        </div>
      </div>
      
      <div class="work-card" style="cursor: pointer;" onclick="window.location.href='mrxa.html'">
        <img src="https://cdn.jsdelivr.net/gh/hjd04/jointek.github.io@main/img/moapxbwk-mgx7ie2.webp" alt="可拆卸式医疗康复机械臂" class="work-image">
        <h3 class="work-title">可拆卸式医疗康复机械臂</h3>
        <div class="work-awards">
          <img src="https://cdn.jsdelivr.net/gh/hjd04/jointek.github.io@main/img/moapxbwk-yy0ebms.webp" alt="奖项" class="award-logo">
        </div>
      </div>
      <div class="work-card">
        <img src="https://cdn.jsdelivr.net/gh/hjd04/jointek.github.io@main/img/moapxbwk-la3es6b.webp" alt="海尔智能随行车伴侣" class="work-image" style="cursor: pointer;" onclick="window.location.href='qispace.html'">
        <h3 class="work-title">海尔智能随行车伴侣</h3>
        <div class="work-awards">
          <img src="https://cdn.jsdelivr.net/gh/hjd04/jointek.github.io@main/img/moapxbwk-t0rx3eh.webp" alt="奖项" class="award-logo">
        </div>
      </div>
      
      <div class="work-card">
        <img src="https://cdn.jsdelivr.net/gh/hjd04/jointek.github.io@main/img/moapxbwk-jctx5ih.webp" alt="其他作品" class="work-image" style="cursor: pointer;" onclick="window.location.href='other-works.html'">
        <h3 class="work-title">其他作品</h3>
        <div class="work-awards">
          <!-- 可以添加其他作品的奖项标志 -->
        </div>
      </div>
    </div>
  </div>
  
  <script>
    // 预设的蓝绿色系色彩范围
    const colors = [
      'linear-gradient(135deg, #65b9ff, #007fb5)',
      'linear-gradient(135deg, #30ff9e, #008e55)',
      'linear-gradient(135deg, #4ecdc4, #45b7d1)',
      'linear-gradient(135deg, #00c9ff, #92fe9d)',
      'linear-gradient(135deg, #a8edea, #fed6e3)',
      'linear-gradient(135deg, #84fab0, #8fd3f4)'
    ];

    // 创建多个背景模糊圆点
    const blobCount = 5;
    const backgroundAnimation = document.querySelector('.background-animation');
    
    // 清空现有的圆点
    backgroundAnimation.innerHTML = '';
    
    // 创建新的圆点
    for (let i = 0; i < blobCount; i++) {
      const blob = document.createElement('div');
      blob.classList.add('bg-blob');
      
      // 随机初始位置
      const initialX = Math.random() * 100;
      const initialY = Math.random() * 100;
      
      // 随机初始大小
      const size = 300 + Math.random() * 300;
      
      // 随机初始颜色
      const color = colors[Math.floor(Math.random() * colors.length)];
      
      blob.style.width = `${size}px`;
      blob.style.height = `${size}px`;
      blob.style.left = `${initialX}%`;
      blob.style.top = `${initialY}%`;
      blob.style.background = color;
      
      // 存储初始位置和速度
      blob.dataset.x = initialX;
      blob.dataset.y = initialY;
      blob.dataset.speedX = (Math.random() - 0.5) * 0.1;
      blob.dataset.speedY = (Math.random() - 0.5) * 0.1;
      
      backgroundAnimation.appendChild(blob);
    }

    // 鼠标位置跟踪
    let mouseX = 0.5;
    let mouseY = 0.5;
    
    document.addEventListener('mousemove', function(e) {
      mouseX = e.clientX / window.innerWidth;
      mouseY = e.clientY / window.innerHeight;
    });

    // 动画循环
    function animate() {
      const blobs = document.querySelectorAll('.bg-blob');
      
      blobs.forEach((blob, index) => {
        // 获取当前位置
        let x = parseFloat(blob.dataset.x);
        let y = parseFloat(blob.dataset.y);
        
        // 获取速度
        let speedX = parseFloat(blob.dataset.speedX);
        let speedY = parseFloat(blob.dataset.speedY);
        
        // 鼠标位置影响
        const mouseInfluence = 0.02 * (index + 1);
        const targetX = x + (mouseX * 100 - x) * mouseInfluence;
        const targetY = y + (mouseY * 100 - y) * mouseInfluence;
        
        // 平滑过渡到目标位置
        x += (targetX - x) * 0.05;
        y += (targetY - y) * 0.05;
        
        // 边界检查和反弹
        if (x < 0 || x > 100) {
          speedX *= -1;
        }
        if (y < 0 || y > 100) {
          speedY *= -1;
        }
        
        // 随机移动
        x += speedX;
        y += speedY;
        
        // 随机大小变化
        const size = 300 + Math.sin(Date.now() * 0.001 + index) * 100;
        
        // 随机颜色变化（偶尔）
        if (Math.random() < 0.001) {
          const color = colors[Math.floor(Math.random() * colors.length)];
          blob.style.background = color;
        }
        
        // 更新位置和速度
        blob.dataset.x = x;
        blob.dataset.y = y;
        blob.dataset.speedX = speedX;
        blob.dataset.speedY = speedY;
        
        // 应用变换
        blob.style.transform = `translate(${x - 50}%, ${y - 50}%)`;
        blob.style.width = `${size}px`;
        blob.style.height = `${size}px`;
      });
      
      requestAnimationFrame(animate);
    }

    // 启动动画
    animate();
  </script>
</body>
</html>
